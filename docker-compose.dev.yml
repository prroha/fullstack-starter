# Development Docker Compose with Hot Reload
# Usage: docker compose -f docker-compose.dev.yml up

services:
  # ==========================================================================
  # PostgreSQL Database (Development)
  # ==========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: fullstack-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localpass
      POSTGRES_DB: fullstack_dev
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - dev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fullstack_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==========================================================================
  # Backend API (Development with Hot Reload)
  # ==========================================================================
  backend:
    image: node:20-alpine
    container_name: fullstack-backend-dev
    working_dir: /app
    user: "${UID:-1000}:${GID:-1000}"
    command: sh -c "npm install && npx prisma generate && npx prisma migrate dev --name init --skip-seed 2>/dev/null || true && npm run dev"
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://postgres:localpass@postgres:5432/fullstack_dev?schema=public
      JWT_SECRET: dev-secret-change-in-production
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:3000
    volumes:
      - ./core/backend:/app
      - backend_node_modules:/app/node_modules
    ports:
      - "3001:3001"
    networks:
      - dev-network
    depends_on:
      postgres:
        condition: service_healthy
    # Faster restart on file changes
    stdin_open: true
    tty: true

  # ==========================================================================
  # Frontend Web (Development with Hot Reload)
  # ==========================================================================
  web:
    image: node:20-alpine
    container_name: fullstack-web-dev
    working_dir: /app
    user: "${UID:-1000}:${GID:-1000}"
    command: sh -c "npm install && npm run dev"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3001
      WATCHPACK_POLLING: "true"
    volumes:
      - ./core/web:/app
      - web_node_modules:/app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    networks:
      - dev-network
    depends_on:
      - backend
    stdin_open: true
    tty: true

  # ==========================================================================
  # pgAdmin (Optional - Database GUI)
  # ==========================================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fullstack-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    networks:
      - dev-network
    depends_on:
      - postgres
    profiles:
      - tools

  # ==========================================================================
  # Studio Backend API (Development with Hot Reload) — port 3001
  # ==========================================================================
  studio-backend:
    image: node:20-alpine
    container_name: studio-backend-dev
    working_dir: /app
    user: "${UID:-1000}:${GID:-1000}"
    command: sh -c "npm install && npx prisma generate && npx prisma migrate dev --name init --skip-seed 2>/dev/null || true && npm run dev"
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://postgres:localpass@postgres:5432/studio_dev?schema=public
      JWT_SECRET: dev-jwt-secret-at-least-32-characters-long
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:3002,http://localhost:3004
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: admin1234
      PREVIEW_BACKEND_URL: http://preview-backend:3003
      INTERNAL_API_SECRET: dev-internal-secret-that-is-at-least-64-characters-long-for-hmac-signing
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_...}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_...}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: noreply@localhost
    volumes:
      - ./studio/backend:/app
      - studio_backend_node_modules:/app/node_modules
    ports:
      - "3001:3001"
    networks:
      - dev-network
    depends_on:
      postgres:
        condition: service_healthy
    stdin_open: true
    tty: true
    profiles:
      - studio

  # ==========================================================================
  # Studio Frontend Web (Development with Hot Reload) — port 3002
  # ==========================================================================
  studio-web:
    image: node:20-alpine
    container_name: studio-web-dev
    working_dir: /app
    user: "${UID:-1000}:${GID:-1000}"
    command: sh -c "npm install && npm run dev"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
      NEXT_PUBLIC_APP_NAME: Xitolaunch
      NEXT_PUBLIC_PREVIEW_FRONTEND_URL: http://localhost:3004
      NEXT_PUBLIC_PREVIEW_BACKEND_URL: http://localhost:3003
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-pk_test_...}
      WATCHPACK_POLLING: "true"
    volumes:
      - ./studio/web:/app
      - studio_web_node_modules:/app/node_modules
      - /app/.next
    ports:
      - "3002:3002"
    networks:
      - dev-network
    depends_on:
      - studio-backend
    stdin_open: true
    tty: true
    profiles:
      - studio

  # ==========================================================================
  # Preview Backend (Development with Hot Reload) — port 3003
  # ==========================================================================
  preview-backend:
    image: node:20-alpine
    container_name: preview-backend-dev
    working_dir: /app/preview/backend
    user: "${UID:-1000}:${GID:-1000}"
    command: sh -c "npm install && npx prisma generate && npm run dev"
    environment:
      NODE_ENV: development
      PORT: 3003
      DATABASE_URL: postgresql://postgres:localpass@postgres:5432/studio_dev?schema=public
      JWT_SECRET: dev-jwt-secret-at-least-32-characters-long
      CORS_ORIGIN: http://localhost:3002,http://localhost:3004
      STUDIO_API_URL: http://studio-backend:3001/api
      INTERNAL_API_SECRET: dev-internal-secret-that-is-at-least-64-characters-long-for-hmac-signing
      MAX_PREVIEW_SCHEMAS: "50"
      PREVIEW_TTL_HOURS: "4"
    volumes:
      - ./preview/backend:/app/preview/backend
      - ./core/backend/src:/app/core/backend/src
      - ./modules:/app/modules
      - preview_backend_node_modules:/app/preview/backend/node_modules
    ports:
      - "3003:3003"
    networks:
      - dev-network
    depends_on:
      postgres:
        condition: service_healthy
      studio-backend:
        condition: service_started
    stdin_open: true
    tty: true
    profiles:
      - studio

  # ==========================================================================
  # Preview Frontend Web (Development with Hot Reload) — port 3004
  # ==========================================================================
  preview-web:
    image: node:20-alpine
    container_name: preview-web-dev
    working_dir: /app/preview/web
    user: "${UID:-1000}:${GID:-1000}"
    command: sh -c "npm install && npm run dev"
    environment:
      NODE_ENV: development
      PORT: 3004
      NEXT_PUBLIC_API_URL: http://localhost:3003/api
      NEXT_PUBLIC_STUDIO_URL: http://localhost:3001
      WATCHPACK_POLLING: "true"
    volumes:
      - ./preview/web:/app/preview/web
      - ./core/web/src:/app/core/web/src
      - ./modules:/app/modules
      - preview_web_node_modules:/app/preview/web/node_modules
      - /app/preview/web/.next
    ports:
      - "3004:3004"
    networks:
      - dev-network
    depends_on:
      - preview-backend
    stdin_open: true
    tty: true
    profiles:
      - studio

# ==========================================================================
# Networks
# ==========================================================================
networks:
  dev-network:
    driver: bridge

# ==========================================================================
# Volumes
# ==========================================================================
volumes:
  postgres_data_dev:
    driver: local
  backend_node_modules:
    driver: local
  web_node_modules:
    driver: local
  pgadmin_data:
    driver: local
  studio_backend_node_modules:
    driver: local
  studio_web_node_modules:
    driver: local
  preview_backend_node_modules:
    driver: local
  preview_web_node_modules:
    driver: local
